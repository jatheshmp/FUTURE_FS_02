<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-light bg-light shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTTEuSRJfIxXhSX7wZ0KYgyQTFkg9UeqeQYVUmY_-jYeg&s=10"
                    height="50" alt="Logo">
            </a>
            <h5 class="mb-0">Registration Form</h5>
        </div>
    </nav>

    <div class="container mt-4">

        <!-- Success / Error Message -->
        <div id="message"></div>

        <div class="row">

            <div class="col-md-6">

                <!-- Registration Form -->
                <h4 class="bg-light p-2">
                    Register Your Details
                </h4>

                <form id="registerform">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text"
                               id="name"
                               class="form-control"
                               placeholder="Enter Your Name"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               id="email"
                               class="form-control"
                               placeholder="Enter Your Email"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="number"
                               id="number"
                               class="form-control"
                               placeholder="Enter Phone Number"
                               required>
                    </div>

                    <div class="mb-3">

                        <label class="form-label">Gender</label>

                        <div class="form-check">
                            <input class="form-check-input"
                                   type="radio"
                                   id="male"
                                   name="gender"
                                   value="Male"
                                   required>

                            <label class="form-check-label" for="male">
                                Male
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                   type="radio"
                                   id="female"
                                   name="gender"
                                   value="Female">

                            <label class="form-check-label" for="female">
                                Female
                            </label>
                        </div>

                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Submit
                    </button>

                </form>

                <!-- View Details -->
                <div id="showmessage" class="mt-5">

                    <h4 class="bg-light p-2">
                        View Details
                    </h4>

                    <table class="table table-bordered table-success">

                        <thead>

                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Number</th>
                                <th>Gender</th>
                            </tr>

                        </thead>

                        <tbody id="tableBody">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script src="script6.js"></script>

</body>

</html>
